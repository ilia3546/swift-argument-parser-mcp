name: Feature request
description: Suggest a new capability or an improvement to an existing one.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Before filing, check whether the same idea
        already lives in an open issue or in a `Documentation.docc/Articles/`
        article — we sometimes capture intentional non-goals there.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user-facing scenario that is awkward today. Skip if you are proposing a pure internal refactor.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Sketch the API or behaviour you have in mind. Code snippets welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you rejected them.
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Links, prior art, related issues, MCP spec references, etc.
